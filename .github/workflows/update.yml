name: Update Growth250 Data

on:
  schedule:
    - cron: '30 6 * * 1-5'
  workflow_dispatch:
    inputs:
      post_dry_run:
        description: "概況を投稿せず内容だけ確認する(データ更新とFTPは通常通り実行)"
        type: boolean
        default: false

concurrency:
  group: update-growth250
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install yfinance pandas anthropic tweepy requests

      - name: Fetch data
        run: python scripts/fetch_data.py

      - name: Upload to Lolipop (FTP)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.LOLIPOP_FTP_HOST }}
          username: ${{ secrets.LOLIPOP_FTP_USER }}
          password: ${{ secrets.LOLIPOP_FTP_PASSWORD }}
          local-dir: ./public/
          server-dir: ${{ secrets.LOLIPOP_FTP_PATH }}
          state-name: .ftp-deploy-growth250.json
          dangerous-clean-slate: false

      - name: 概況をWordPress＋Xに投稿
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          WP_BASE_URL: ${{ secrets.WP_BASE_URL }}
          WP_USER: ${{ secrets.WP_USER }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
          WP_CATEGORY_ID: ${{ secrets.WP_CATEGORY_ID }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
          DRY_RUN: ${{ (github.event_name == 'workflow_dispatch' && inputs.post_dry_run) && '1' || '' }}
        run: python scripts/post_growth250.py
